version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci
      - npm install -g aws-cdk ts-node
  build:
    commands:
      - |
        for dir in lambda/schema-migration lambda/aurora-app lambda/rpo-monitor lambda/reconciliation lambda/loadgen; do
          if [ -f "$dir/requirements.txt" ]; then
            echo "Installing deps for $dir..."
            pip install -r "$dir/requirements.txt" -t "$dir/" --platform manylinux2014_x86_64 --implementation cp --python-version 3.12 --only-binary=:all: --quiet
          fi
        done
      - make deploy
