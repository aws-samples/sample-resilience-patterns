name: 'aurora: e2e'

on:
  pull_request:
    paths: ['aurora/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: aurora

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::190334034435:role/github-actions-aws-samples_sample-resilience-patterns
          aws-region: us-east-1

      - run: npm ci
      - run: npx projen test
      - name: Get account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT
      - name: Deploy via bootstrap
        run: |
          npx cdk deploy aurora-bootstrap \
            -c stack=bootstrap \
            -c project=aurora \
            -c primaryRegion=us-east-1 \
            -c secondaryRegion=us-west-2 \
            -c accountId=${{ steps.account.outputs.id }} \
            --require-approval never
      - name: Verify canaries
        run: |
          echo "Waiting for canaries to run..."
          sleep 360
          for canary in aurora-rd-local-e1 aurora-wr-local-e1; do
            aws synthetics get-canary-runs --name $canary --region us-east-1 --query 'CanaryRuns[0].Status.State' --output text || true
          done
      - name: Cleanup on success
        if: success()
        run: ./cleanup.sh
