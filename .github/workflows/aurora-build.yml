name: 'aurora: build'

on:
  push:
    branches-ignore: [main]
    paths: ['aurora/**']
  workflow_dispatch:

defaults:
  run:
    working-directory: aurora

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx projen test
      - run: npx cdk synth -c stack=bootstrap
